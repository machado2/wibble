{% extends "base.html" %}

{% block content %}
<section class="image-info-layout">
  <div class="image-stage card">
    <img src="/image/{{image_id}}" alt="{{title}}" class="image-stage-media">
  </div>

  <article class="image-info-panel card">
    <div class="card-body image-info-body">
      <p class="image-info-kicker">Image prompt</p>
      <h1 class="image-info-title">{{title}}</h1>
      <p class="image-info-prompt">{{prompt}}</p>

      <div class="image-info-meta" aria-label="Image metadata">
        <div class="image-meta-chip">
          <span class="image-meta-label">Status</span>
          <strong>{{status}}</strong>
        </div>
        <div class="image-meta-chip">
          <span class="image-meta-label">Created</span>
          <strong><time>{{created_at}}</time></strong>
        </div>
        {% if model %}
        <div class="image-meta-chip">
          <span class="image-meta-label">Model</span>
          <strong>{{model}}</strong>
        </div>
        {% endif %}
      </div>

      {% if last_error %}
      <div class="image-info-alert" role="alert">
        <span class="image-info-alert-label">Last error</span>
        <p class="mb-0">{{last_error}}</p>
      </div>
      {% endif %}

      <div class="image-info-footer">
        <p class="image-info-article-label">Used in</p>
        <a href="/content/{{slug}}" class="image-info-article-link">"{{content_title}}"</a>
      </div>
    </div>
  </article>
</section>
{% endblock content %}
