{% extends "base.html" %}

{% block content %}
<article class="card border-0 bg-white article-card">
  <div class="card-body article-content">
    <h1 class="display-4 mb-3">{{title}}</h1>
    <p class="text-muted mb-4"><time>{{created_at}}</time></p>
    {%- if can_edit -%}
    <div class="mb-4">
      <a class="btn btn-outline-primary" href="/content/{{slug}}/edit">Edit article</a>
    </div>
    {%- endif -%}
    {%- if can_publish -%}
    <div class="mb-4">
      {%- if is_published -%}
      <form method="post" action="/content/{{slug}}/publish" style="display:inline;">
        <button type="submit" class="btn btn-outline-warning">Unpublish</button>
      </form>
      {%- else -%}
      <form method="post" action="/content/{{slug}}/publish" style="display:inline;">
        <button type="submit" class="btn btn-outline-success">Publish</button>
      </form>
      <span class="badge bg-warning text-dark ms-2">Draft</span>
      {%- endif -%}
    </div>
    {%- endif -%}
    {{ body | safe }}
  </div>
</article>
{% endblock content %}
