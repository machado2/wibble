{% extends "base.html" %}

{% block content %}
<div class="feed-grid">
  {% for i in items %}
  <div class="card border-0 bg-white hover-shadow">
    <a href="/content/{{ i.slug }}{% if loop.index0 < 3 %}?source=top{% endif %}" class="text-decoration-none feed-card stretched-link">
      <img src="/image/{{ i.image_id }}"
           class="feed-card-image"
           alt="">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title mb-2">{{ i.title }}</h5>
        <p class="text-muted small mb-2">{{ i.created_at }}</p>
        <p class="card-text flex-grow-1">{{ i.description }}</p>
      </div>
    </a>
  </div>
  {% endfor %}
</div>

<div class="text-center mt-5">
  <a href="?afterId={{ after_id }}" class="btn btn-outline-primary">Load More Articles</a>
</div>
{% endblock content %}
