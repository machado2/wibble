{% extends "base.html" %}

{% block content %}
<header class="mb-4">
  <h1 class="display-5 mb-2">Generated Image Gallery</h1>
  <p class="text-muted mb-0">Recent images produced for Wibble stories.</p>
</header>

<div class="image-grid">
  {% for i in items %}
  <a href="/image_info/{{ i }}" class="text-decoration-none">
    <img src="/image/{{ i }}" class="img-fluid rounded" alt="">
  </a>
  {% endfor %}
</div>

<div class="text-center mt-4">
  <a href="?afterId={{ last_id }}" class="btn btn-primary">Next Page</a>
</div>
{% endblock content %}
