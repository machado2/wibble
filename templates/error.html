{% extends "base.html" %}

{% block content %}
<div class="card">
  <div class="card-body text-center">
    <h1 class="card-title mb-3">{{title}}</h1>
    <p class="card-text text-danger">{{error_message}}</p>
    <img src="{{image_url}}" alt="{{ ui.error.image_alt }}" class="img-fluid mb-3 error-image">
  </div>
</div>
{% endblock content %}
